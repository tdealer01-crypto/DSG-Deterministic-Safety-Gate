name: DSG JS SDK Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/js/package.json

      - name: Install dependencies
        working-directory: sdk/js
        run: npm install

      - name: Build JavaScript SDK
        working-directory: sdk/js
        run: npm run build
