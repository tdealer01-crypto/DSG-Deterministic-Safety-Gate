name: DSG Python Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: dsg-core/pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./dsg-core[dev]

      - name: Run Python example smoke test
        run: |
          python examples/python/basic_usage.py
